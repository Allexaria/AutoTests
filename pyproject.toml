[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  ".git",
  ".pytest_cache",
  "__pycache__",
  ".mypy_cache",
  ".ruff_cache",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
exclude = [
  "AutoTests-abobatests/tests",
  "UI-framework-abobatests",
  "API-framework-develope",
]
