stages:
  - lint
  - test

lint_checks:
  stage: lint
  image: python:3.10
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - ruff check .
    - black --check .

test_api:
  stage: test
  image: python:3.10
  only:
    - abobatests
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests -m api --alluredir=allure-results/api
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - allure-results

test_ui:
  stage: test
  image: python:3.10
  only:
    - abobatests
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests -m ui --alluredir=allure-results/ui
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - allure-results
